<div class="flex justify-center items-center h-screen w-screen ">
  <div class="flex flex-col p-5 shadow-2xl rounded-lg w-120 h-auto ">
    <div class="flex flex-col justify-center items-center">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-10">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
      </svg>

      <h2 class="text-3xl  text-black font-bold ">Acceder a cuenta</h2>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="w-full flex flex-col justify-center items-center">
      <mat-form-field appearance="outline" class="w-full my-2">
        <mat-label>Username: </mat-label>
        <input matInput formControlName="username" type="text">
        @if (isValidField(loginForm,"username")) {
        <mat-error>

          {{getFieldErrors(loginForm,"username")}}
        </mat-error>
        }
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full my-2">
        <mat-label>password: </mat-label>
        <input matInput formControlName="password" type="password">
        @if (isValidField(loginForm,"password")) {
        <mat-error>
          {{getFieldErrors(loginForm,"password")}}
        </mat-error>
        }

      </mat-form-field>

      <div class="flex flex-row justify-center items-center mt-2">
        <button
          class="w-50 bg-slate-400 text-white font-bold rounded-full p-3 hover:bg-white hover:text-slate-400 hover:border hover:border-slate-400 transition-all ease-in-out .5s cursor-pointer "
          color="blue" type="submit">Acceder</button>
      </div>
    </form>

  </div>
</div>
