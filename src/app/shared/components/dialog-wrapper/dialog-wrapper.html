<div class="flex flex-col  p-5 ">
  <div class=" flex flex-row justify-between items-center border-b border-slate-500 ">
    <div class=" flex flex-row">
      <h2 class="text-xl font-bold">{{title}}</h2>
      <div class="flex flex-row ">
        @if (primaryButtonTitle.length>0) {
        <button (click)="PrimaryButtonClick()"
          class="rounded-sm cursor-pointer p-2 ml-2 bg-slate-500 text-white mb-2 font-bold">
          Save
        </button>
        }

        @if (secondaryButtonTitle.length>0) {
        <button (click)="SecondaryButtonClick()"
          class="rounded-sm cursor-pointer p-2 ml-2 bg-slate-500 text-white mb-2 font-bold">
          Save
        </button>
        }

        @if (thirdButtonTitle.length>0) {
        <button (click)="thirdButtonClick()"
          class="rounded-sm cursor-pointer p-2 ml-2 bg-slate-500 text-white mb-2 font-bold">
          Save
        </button>
        }

      </div>
    </div>
    <button (click)="onClose()" class="rounded-lg cursor-pointer p-2 mb-2 bg-red-700 text-white font-bold">
      X
    </button>
  </div>
  <div class="flex flex-row w-full">
    <ng-content></ng-content>
  </div>
</div>
